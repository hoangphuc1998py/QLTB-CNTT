<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUẢN LÝ THIẾT BỊ CNTT Anhuco</title>
    <link rel="stylesheet" href="style.css" />
  </head>
   <body>
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>
    <div class="bg-orb orb-3" aria-hidden="true"></div>
    <main class="app-shell">
     <header class="hero">
        <div class="hero-top">
          <div>
            <h1>💻 Quản lý thiết bị CNTT</h1>
            <p>Theo dõi thiết bị tập trung với giao diện rõ ràng và dữ liệu lưu trên database.</p>
          </div>
          <button type="button" class="btn btn-secondary" id="logoutBtn">Đăng xuất</button>
        </div>
      </header>

      <section class="card">
        <div class="section-head">
          <h2 id="formTitle">Thêm thiết bị</h2>
          <span class="pulse-tag">⚡ Cập nhật nhanh</span>
        </div>
        <form id="deviceForm" class="device-form">
          <div class="form-row">
            <label for="name">Tên thiết bị</label>
            <input id="name" required placeholder="VD: Dell Latitude 7420" />
          </div>

          <div class="form-row">
            <label for="type">Loại</label>
            <input id="type" required placeholder="Laptop / Máy in / Màn hình" />
          </div>

          <div class="form-row">
            <label for="user">User</label>
            <input id="user" placeholder="VD: phuc" />
          </div>

          <div class="form-row">
            <label for="content">Nội dung</label>
            <input id="content" placeholder="Mô tả ngắn nội dung sử dụng" />
          </div>

          <div class="form-row">
            <label for="status">Tình trạng</label>
            <select id="status" required>
              <option value="">-- Chọn tình trạng --</option>
              <option value="Hoạt động tốt">Hoạt động tốt</option>
              <option value="Đang bảo trì">Đang bảo trì</option>
              <option value="Hỏng">Hỏng</option>
            </select>
          </div>

          <div class="form-row">
            <label for="image">Ảnh thiết bị (tuỳ chọn)</label>
            <input type="file" id="image" accept="image/*" />
          </div>

          <div class="btn-group">
            <button type="submit" class="btn btn-primary" id="submitBtn">➕ Thêm thiết bị</button>
            <button type="button" class="btn btn-secondary" id="cancelBtn" hidden>Huỷ chỉnh sửa</button>
          </div>
        </form>
      </section>

       <section class="card">
        <div class="toolbar">
          <input id="search" placeholder="🔍 Tìm theo tên hoặc loại thiết bị..." />
          <div class="toolbar-actions">
            <a class="btn btn-secondary" href="/history.html">🕘 Xem lịch sử thay đổi</a>
            <button class="btn btn-export" id="exportBtn">⬇️ Xuất CSV</button>
          </div>
        </div>

        <div class="stats" id="stats">
          <article class="stat-item stat-total">
            <div class="stat-head">
              <span class="stat-icon">🧾</span>
              <span class="stat-label">Tổng thiết bị:</span>
            </div>
            <strong id="totalCount">0</strong>
          </article>
          <article class="stat-item stat-good">
            <div class="stat-head">
              <span class="stat-icon">✅</span>
              <span class="stat-label">Hoạt động tốt:</span>
            </div>
            <strong id="goodCount">0</strong>
          </article>
          <article class="stat-item stat-maintain">
            <div class="stat-head">
              <span class="stat-icon">🛠️</span>
              <span class="stat-label">Đang bảo trì:</span>
            </div>
            <strong id="maintainCount">0</strong>
          </article>
          <article class="stat-item stat-broken">
            <div class="stat-head">
              <span class="stat-icon">🚨</span>
              <span class="stat-label">Hỏng:</span>
            </div>
            <strong id="brokenCount">0</strong>
          </article>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Ảnh</th>
                <th>Tên</th>
                <th>Loại</th>
                <th>User</th>
                <th>Nội dung</th>
                <th>Tình trạng</th>
                <th>Ngày tạo</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="list"></tbody>
          </table>
        </div>
      </section>

    </main>
    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
  </body>
</html>
