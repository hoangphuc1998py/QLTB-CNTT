<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập Admin</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <main class="app-shell login-shell">
      <section class="card login-card">
        <h1>🔐 Đăng nhập quản trị</h1>
        <p>Nhập mật khẩu admin để truy cập vào trang <strong>index.html</strong>.</p>

        <form id="loginForm" class="login-form">
          <label for="password">Mật khẩu</label>
          <input id="password" type="password" placeholder="Nhập mật khẩu admin" required />
          <button class="btn btn-primary" type="submit">Đăng nhập</button>
        </form>

        <!-- <p class="hint">Bạn có thể cấu hình mật khẩu qua biến môi trường <code>ADMIN_PASSWORD</code>.</p> -->
      </section>
    </main>

    <div id="toast" class="toast"></div>
    <script src="admin.js"></script>
  </body>
</html>
