<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập Admin</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <main class="app-shell login-shell">
      <section class="card login-card">
        <h1>🔐 Đăng nhập quản trị</h1>  
        <form id="loginForm" class="login-form">
          <label for="username">Tài khoản</label>
          <input id="username" type="text" placeholder="Nhập tài khoản admin" required />
          <label for="password">Mật khẩu</label>
          <input id="password" type="password" placeholder="Nhập mật khẩu admin" required />
          <button class="btn btn-primary" type="submit">Đăng nhập</button>
        </form>
        <p class="hint">
          <!-- Tài khoản mặc định: <code>admin</code>. Mật khẩu mặc định: <code>admin123</code>
          (hỗ trợ tương thích <code>admin</code>, <code>123456</code>). Bạn có thể cấu hình bằng biến môi trường
          <code>ADMIN_USERNAME</code> và <code>ADMIN_PASSWORD</code>. -->
        </p>
      </section>  
    </main>

    <div id="toast" class="toast"></div>
    <script src="admin.js"></script>
  </body>
</html>
