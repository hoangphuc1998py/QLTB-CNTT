<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập hệ thống</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <main class="app-shell login-shell">
      <section class="card login-card">
        <h1>🔐 Đăng nhập hệ thống</h1>  
        <form id="loginForm" class="login-form">
          <label for="username">Tài khoản</label>
          <input id="username" type="text" placeholder="Nhập tài khoản" required />
          <label for="password">Mật khẩu</label>
          <input id="password" type="password" placeholder="Nhập mật khẩu" required />
          <button class="btn btn-primary" type="submit">Đăng nhập</button>
        </form>
        <!-- <p class="hint">
          Tài khoản mặc định: <code>admin/admin123</code> (admin) và <code>user/user123</code> (user). Bạn có thể đổi bằng biến môi trường
          <code>ADMIN_USERNAME</code>, <code>ADMIN_PASSWORD</code>, <code>DEFAULT_USER_USERNAME</code>, <code>DEFAULT_USER_PASSWORD</code>.
        </p>   -->
      </section>  
    </main>

    <div id="toast" class="toast"></div>
    <script src="admin.js"></script>
  </body>
</html>
